version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: assetflow_db
    restart: always
    environment:
      POSTGRES_USER: assetflow_user
      POSTGRES_PASSWORD: assetflow_password
      POSTGRES_DB: assetflow_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow_user -d assetflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://assetflow_user:assetflow_password@db:5432/assetflow_db
      - JWT_SECRET=supersecretjwtkeyforassetflowproject2026
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/workspace/uploads


volumes:
  pgdata:
